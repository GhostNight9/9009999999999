<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CONSOLE</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --red: #ff2020;
    --red-dim: #8b0000;
    --red-glow: #ff000066;
    --bg: #050000;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  html, body {
    width: 100%; height: 100%;
    background: var(--bg);
    font-family: 'Share Tech Mono', monospace;
    color: var(--red);
    overflow: hidden;
    touch-action: none;
  }

  body::before {
    content: '';
    position: fixed; inset: 0;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.18) 2px, rgba(0,0,0,0.18) 4px
    );
    pointer-events: none;
    z-index: 1000;
  }

  body::after {
    content: '';
    position: fixed; inset: 0;
    background-image:
      linear-gradient(rgba(180,0,0,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(180,0,0,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  #app {
    position: relative;
    width: 100%; height: 100%;
    display: flex;
    flex-direction: column;
    z-index: 1;
  }

  #header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 10px 18px 6px;
    border-bottom: 1px solid var(--red-dim);
    background: linear-gradient(180deg, #0d0000 0%, transparent 100%);
    flex-shrink: 0;
  }

  #logo {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 15px;
    letter-spacing: 5px;
    color: var(--red);
    text-shadow: 0 0 12px var(--red), 0 0 30px var(--red-glow);
    animation: pulse-logo 3s ease-in-out infinite;
  }
  @keyframes pulse-logo {
    0%,100% { text-shadow: 0 0 12px var(--red), 0 0 30px var(--red-glow); }
    50% { text-shadow: 0 0 22px var(--red), 0 0 55px var(--red-glow), 0 0 90px var(--red-glow); }
  }

  #status-row { display: flex; gap: 14px; align-items: center; }

  .status-pill {
    font-size: 9px;
    letter-spacing: 2px;
    padding: 3px 8px;
    border: 1px solid var(--red-dim);
    border-radius: 2px;
    color: var(--red);
    background: rgba(139,0,0,0.12);
  }
  .status-pill.blink { animation: blink 1.2s step-end infinite; }
  @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

  #clock { font-size: 10px; color: #550000; letter-spacing: 2px; }

  #terminal {
    flex: 1;
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px 18px 8px;
    display: flex;
    flex-direction: column;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }
  #terminal::-webkit-scrollbar { display: none; }

  .line {
    font-size: 13px;
    line-height: 1.65;
    white-space: pre-wrap;
    word-break: break-all;
    color: var(--red);
    animation: line-appear 0.08s ease;
  }
  @keyframes line-appear { from { opacity:0; transform: translateX(-3px); } to { opacity:1; } }

  .line.sys    { color: #660000; }
  .line.ok     { color: #ff2020; text-shadow: 0 0 6px rgba(255,0,0,0.4); }
  .line.done   { color: #aa1100; }
  .line.cmd    { color: #ff5555; text-shadow: 0 0 4px rgba(255,50,50,0.5); }
  .line.warn   { color: #ff4400; text-shadow: 0 0 10px #ff2200; }
  .line.bright { color: #ff3333; text-shadow: 0 0 12px #ff0000, 0 0 24px rgba(255,0,0,0.4); font-weight: bold; }
  .line.dim    { color: #330000; }

  #cursor-line {
    display: flex;
    align-items: center;
    gap: 6px;
    padding: 4px 0;
    font-size: 13px;
  }
  #prompt { color: #ff4444; text-shadow: 0 0 8px var(--red); }
  #input-display {
    flex: 1; min-width: 0;
    word-break: break-all; white-space: pre-wrap;
    color: #ff5555;
    text-shadow: 0 0 4px rgba(255,50,50,0.5);
  }
  #cursor-block {
    width: 9px; height: 16px;
    background: var(--red);
    display: inline-block;
    animation: cursor-blink 0.8s step-end infinite;
    box-shadow: 0 0 8px var(--red);
    vertical-align: middle;
  }
  @keyframes cursor-blink { 0%,100%{opacity:1} 50%{opacity:0} }

  #tap-hint {
    text-align: center;
    font-size: 10px;
    letter-spacing: 3px;
    color: #330000;
    padding: 4px;
    flex-shrink: 0;
    animation: fade-hint 4s ease 2s forwards;
  }
  @keyframes fade-hint { to { opacity: 0; } }

  /* ── KEYBOARD ── */
  #keyboard {
    flex-shrink: 0;
    background: linear-gradient(180deg, #0a0000 0%, #050000 100%);
    border-top: 1px solid #2a0000;
    padding: 8px 6px 14px;
    user-select: none;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  }
  #keyboard.visible { transform: translateY(0); }

  .kb-row { display: flex; justify-content: center; gap: 5px; margin-bottom: 5px; }

  .key {
    position: relative;
    display: flex; align-items: center; justify-content: center;
    background: linear-gradient(180deg, #1a0000 0%, #0d0000 100%);
    border: 1px solid #3a0000;
    border-bottom: 2px solid #200000;
    border-radius: 4px;
    min-width: 32px; height: 40px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--red);
    cursor: pointer;
    flex: 1; max-width: 42px;
    transition: all 0.08s;
    text-shadow: 0 0 6px var(--red);
    box-shadow: inset 0 1px 0 rgba(255,0,0,0.08), 0 0 4px rgba(255,0,0,0.05);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .key.wide  { max-width: 72px;  flex: 2; font-size: 10px; letter-spacing: 1px; }
  .key.xwide { max-width: 130px; flex: 4; }
  .key.action {
    background: linear-gradient(180deg, #2a0000 0%, #1a0000 100%);
    border-color: #550000;
    color: #ff3333;
    text-shadow: 0 0 10px var(--red);
    box-shadow: inset 0 1px 0 rgba(255,0,0,0.15), 0 0 8px rgba(255,0,0,0.1);
  }
  .key:active, .key.pressed {
    background: linear-gradient(180deg, #3a0000 0%, #220000 100%);
    border-color: var(--red);
    box-shadow: 0 0 14px var(--red), inset 0 0 10px rgba(255,0,0,0.25);
    transform: translateY(1px);
    color: #ff8888;
    text-shadow: 0 0 12px var(--red);
  }
  .key::before {
    content: '';
    position: absolute;
    top: 2px; left: 2px;
    width: 4px; height: 4px;
    border-top: 1px solid rgba(255,0,0,0.2);
    border-left: 1px solid rgba(255,0,0,0.2);
    pointer-events: none;
  }

  .corner {
    position: fixed; width: 28px; height: 28px;
    pointer-events: none; z-index: 500;
  }
  .corner::before, .corner::after { content: ''; position: absolute; background: var(--red); opacity: 0.6; }
  .corner::before { width: 100%; height: 1px; }
  .corner::after  { width: 1px;  height: 100%; }
  .corner.tl { top:6px; left:6px; }
  .corner.tl::before { top:0; left:0; }
  .corner.tl::after  { top:0; left:0; }
  .corner.tr { top:6px; right:6px; }
  .corner.tr::before { top:0; right:0; left:auto; }
  .corner.tr::after  { top:0; right:0; left:auto; }
  .corner.bl { bottom:6px; left:6px; }
  .corner.bl::before { bottom:0; top:auto; left:0; }
  .corner.bl::after  { bottom:0; top:auto; left:0; }
  .corner.br { bottom:6px; right:6px; }
  .corner.br::before { bottom:0; top:auto; right:0; left:auto; }
  .corner.br::after  { bottom:0; top:auto; right:0; left:auto; }
  .key.sym { color: #ff6666; letter-spacing: 1px; font-size: 12px; text-shadow: 0 0 8px var(--red); }
</style>

// ── FULLSCREEN ──
// Browsers require a user gesture to enter fullscreen.
// We try immediately on load (works on some browsers), then on first tap/key.
function requestFS() {
  const el = document.documentElement;
  const fn = el.requestFullscreen || el.webkitRequestFullscreen || el.mozRequestFullScreen || el.msRequestFullscreen;
  if (fn) fn.call(el).catch(() => {});
}

// Try on load
window.addEventListener('load', () => { requestFS(); });

// Try again on first user interaction (required on iOS Safari / most mobile)
let fsTriggered = false;
function triggerFS() {
  if (fsTriggered) return;
  fsTriggered = true;
  requestFS();
}
document.addEventListener('pointerdown', triggerFS, { once: true });
document.addEventListener('keydown', triggerFS, { once: true });

function updateClock() {
  const n = new Date(), pad = x => String(x).padStart(2,'0');
  document.getElementById('clock').textContent =
    `${pad(n.getHours())}:${pad(n.getMinutes())}:${pad(n.getSeconds())}`;
}

// ── TYPEWRITER ──
// Adds a line to terminal and types it out character by character.
// Returns a promise that resolves when done.
function typewriterLine(text, cls='ok', speed=28) {
  return new Promise(resolve => {
    const div = document.createElement('div');
    div.className = 'line ' + cls;
    div.textContent = '';
    terminal.insertBefore(div, cursorLine);
    terminal.scrollTop = terminal.scrollHeight;
    let i = 0;
    function tick() {
      if (i < text.length) {
        div.textContent += text[i++];
        terminal.scrollTop = terminal.scrollHeight;
        playClick('key');
        setTimeout(tick, speed + Math.random() * speed * 0.6);
      } else {
        resolve();
      }
    }
    tick();
  });
}

// Runs an array of [text, cls, speed?] with typewriter, sequentially.
// delay = ms pause before each line starts typing.
async function typewriterSequence(lines, lineDelay=120) {
  for (const [text, cls, speed] of lines) {
    await new Promise(r => setTimeout(r, lineDelay + Math.random() * 80));
    await typewriterLine(text, cls, speed ?? 22);
  }
}

function handleCommand(cmd) {
  const raw = cmd.trim();
  const lower = raw.toLowerCase();

  addLine('>>> ' + raw, 'cmd');

  if (lower === 'clear') { terminal.querySelectorAll('.line').forEach(l => l.remove()); return; }

  // [99] only available after virus9 import
  if (lower === '[99]') {
    if (virus9Unlocked) {
      runActivation99();
    } else {
      addLine('[!] error: no active virus9 session. run //import.virus9//userbit.tagplayer first.', 'warn');
    }
    return;
  }

  // Check custom commands (case-insensitive key match)
  const customKey = Object.keys(customCommands).find(k => k === lower);
  if (customKey) {
    customCommands[customKey]();
    return;
  }

  const resp = responses[lower];
  if (resp) resp.forEach(([t, c]) => addLine(t, c));
  else if (lower !== '') addLine(`[!] unknown command: "${raw}"  (type help)`, 'warn');
  terminal.scrollTop = terminal.scrollHeight;
}

// ── TYPING SOUNDS (Web Audio API — no files needed) ──
const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

function playClick(type = 'key') {
  // Resume context if suspended (browser autoplay policy)
  if (audioCtx.state === 'suspended') audioCtx.resume();

  const now = audioCtx.currentTime;

  if (type === 'key') {
    // Sharp mechanical click — short noise burst + high-freq tick
    const bufSize = audioCtx.sampleRate * 0.04;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      // White noise that decays very quickly
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 8);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;

    // Band-pass filter to give it that crisp clicky character
    const bpf = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = 3800 + Math.random() * 600;
    bpf.Q.value = 1.2;

    // Thin high shelf for brightness
    const shelf = audioCtx.createBiquadFilter();
    shelf.type = 'highshelf';
    shelf.frequency.value = 6000;
    shelf.gain.value = 6;

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.28, now);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.038);

    noise.connect(bpf);
    bpf.connect(shelf);
    shelf.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    noise.start(now);
    noise.stop(now + 0.04);

  } else if (type === 'backspace') {
    // Slightly lower, softer thud
    const bufSize = audioCtx.sampleRate * 0.035;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 10);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;

    const bpf = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = 1800;
    bpf.Q.value = 1.8;

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.18, now);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.03);

    noise.connect(bpf);
    bpf.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    noise.start(now);
    noise.stop(now + 0.035);

  } else if (type === 'enter') {
    // Deeper, heavier thud with a subtle low-freq body
    const bufSize = audioCtx.sampleRate * 0.06;
    const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - i / bufSize, 6);
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buf;

    const bpf = audioCtx.createBiquadFilter();
    bpf.type = 'bandpass';
    bpf.frequency.value = 900;
    bpf.Q.value = 0.9;

    const hpf = audioCtx.createBiquadFilter();
    hpf.type = 'highpass';
    hpf.frequency.value = 300;

    const gainNode = audioCtx.createGain();
    gainNode.gain.setValueAtTime(0.35, now);
    gainNode.gain.exponentialRampToValueAtTime(0.001, now + 0.055);

    noise.connect(bpf);
    bpf.connect(hpf);
    hpf.connect(gainNode);
    gainNode.connect(audioCtx.destination);
    noise.start(now);
    noise.stop(now + 0.06);
  }
}

function updateDisplay() { inputDisplay.textContent = inputBuffer; }
function keyPress(char) { inputBuffer += char; updateDisplay(); playClick('key'); }
function backspace() { inputBuffer = inputBuffer.slice(0, -1); updateDisplay(); playClick('backspace'); }
function enter() { handleCommand(inputBuffer); inputBuffer = ''; updateDisplay(); playClick('enter'); }

rows.forEach((row, ri) => {
  const rowEl = document.getElementById('row' + ri);
  row.forEach(k => {
    const btn = document.createElement('div');
    btn.className = 'key';
    let label, extraClass = '';

    if (Array.isArray(k)) {
      // Could be ['BKSP','wide action'] or [['//','sym'],'wide']
      if (Array.isArray(k[0])) {
        // special: [[label, extraForLabel], wideClass]
        label = k[0][0];
        extraClass = k[1] + ' ' + k[0][1];
      } else {
        label = k[0];
        extraClass = k[1];
      }
      btn.classList.add(...extraClass.trim().split(/\s+/));
    } else {
      label = k;
    }

    btn.textContent = label;
    if (label === 'BKSP')       btn.addEventListener('pointerdown', e => { e.preventDefault(); flashKey(btn); backspace(); });
    else if (label === 'ENTER') btn.addEventListener('pointerdown', e => { e.preventDefault(); flashKey(btn); enter(); });
    else if (label === ' ')     btn.addEventListener('pointerdown', e => { e.preventDefault(); flashKey(btn); keyPress(' '); });
    else btn.addEventListener('pointerdown', e => { e.preventDefault(); flashKey(btn); keyPress(label); });
    rowEl.appendChild(btn);
  });
});

function flashKey(btn) { btn.classList.add('pressed'); setTimeout(() => btn.classList.remove('pressed'), 120); }

const keyboard = document.getElementById('keyboard');
const tapHint = document.getElementById('tap-hint');

// Detect whether a hardware keyboard is connected/in use.
// We start optimistic (assume no hardware keyboard = show on-screen KB on tap).
// The moment ANY physical keydown fires, we know a hardware keyboard is present
// and permanently hide the on-screen keyboard for this session.
let hardwareKeyboard = false;

function enableHardwareMode() {
  if (hardwareKeyboard) return;
  hardwareKeyboard = true;
  // Hide on-screen keyboard and tap hint permanently
  keyboard.style.display = 'none';
  tapHint.style.display = 'none';
}

// iPad with Smart Keyboard / Magic Keyboard fires real keydown events
document.addEventListener('keydown', (e) => {
  // Ignore modifier-only keys
  if (['Meta','Control','Alt','Shift','CapsLock','Tab','Escape'].includes(e.key)) return;
  enableHardwareMode();
  if (e.key === 'Backspace') { e.preventDefault(); backspace(); }
  else if (e.key === 'Enter') { e.preventDefault(); enter(); }
  else if (e.key.length === 1) { keyPress(e.key); }
});

// Touch-only users: show on-screen keyboard when they tap the terminal
terminal.addEventListener('pointerdown', (e) => {
  if (hardwareKeyboard) return;
  // Only show if it was a touch/pen (not a mouse click from hardware-keyboard iPad)
  if (e.pointerType === 'touch') {
    keyboard.classList.add('visible');
    tapHint.style.display = 'none';
  }
});

// Tap outside hides on-screen keyboard (touch-only path)
document.addEventListener('pointerdown', (e) => {
  if (hardwareKeyboard) return;
  if (!keyboard.contains(e.target) && !terminal.contains(e.target)) {
    keyboard.classList.remove('visible');
  }
});
